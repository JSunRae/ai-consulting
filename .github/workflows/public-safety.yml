name: Public Safety

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  public-safety:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public safety audit
        run: python scripts/check_public_safety.py

      - name: Verify public bundle build
        run: python scripts/build_public_bundle.py
