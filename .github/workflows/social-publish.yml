name: social-publish

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * 1-5"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SOCIAL_ARCHIVE_PATH: assets/data/social-posts.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependency
        run: python -m pip install python-dotenv==1.0.1

      - name: Schedule approved posts and sync Buffer state
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_LINKEDIN_CHANNEL_ID: ${{ secrets.BUFFER_LINKEDIN_CHANNEL_ID }}
          BUFFER_X_CHANNEL_ID: ${{ secrets.BUFFER_X_CHANNEL_ID }}
        run: python scripts/social_buffer_publish.py --publish --sync

      - name: Commit archive sync
        run: |
          if git diff --quiet -- assets/data/social-posts.json; then
            echo "No archive changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/social-posts.json
          git commit -m "chore: sync social publishing archive"
          git push
